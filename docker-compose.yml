name: ansible-lab

services:
  web:
    build: ./web
    container_name: web
    networks:
      ansible-lab:
        ipv4_address: 172.20.0.10

    cpus: 0.5

  web2:
    build: ./web
    container_name: web2
    networks:
      ansible-lab:
        ipv4_address: 172.20.0.11

    cpus: 0.5

  db:
    build: ./db
    container_name: db
    networks:
      ansible-lab:
        ipv4_address: 172.20.0.20

    cpus: 0.5

  load_balancer:
    build: ./load_balancer
    container_name: load_balancer
    networks:
      ansible-lab:
        ipv4_address: 172.20.0.5

    cpus: 0.5

  host:
    build: ./host
    container_name: host
    networks:
      ansible-lab:
        ipv4_address: 172.20.0.30

    cpus: 0.5

networks:
  ansible-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24